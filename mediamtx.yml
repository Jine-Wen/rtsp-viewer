rtsp: true
rtspAddress: 0.0.0.0:8554
rtmp: true
rtmpAddress: 0.0.0.0:1935
hls: true
hlsAddress: 0.0.0.0:8888
hlsVariant: mpegts
hlsSegmentCount: 6
hlsSegmentDuration: 1s
hlsSegmentMaxSize: 200MB
hlsAlwaysRemux: true
hlsAllowOrigin: '*'
webrtc: true
webrtcAddress: 0.0.0.0:8889
api: true
apiAddress: 0.0.0.0:9997
paths:
  all: null
  jh1-main:
    runOnDemand: ffmpeg -rtsp_transport tcp -fflags nobuffer+discardcorrupt -flags
      low_delay -hwaccel cuda -hwaccel_output_format cuda -c:v hevc_cuvid -i rtsp://10.66.66.160:8554/cam1
      -vf "scale_cuda=1920:-2,hwdownload,format=nv12" -c:v libx264 -tune zerolatency
      -preset ultrafast -crf 23 -g 30 -an -f rtsp rtsp://localhost:8554/jh1-main
    runOnDemandRestart: true
    runOnDemandStartTimeout: 30s
    runOnDemandCloseAfter: 10s
  jh2-main:
    runOnDemand: ffmpeg -rtsp_transport tcp -fflags nobuffer+discardcorrupt -flags
      low_delay -probesize 32 -analyzeduration 0 -i rtsp://10.66.66.125:8554/cam1
      -vf "scale=1920:-2" -c:v libx264 -tune zerolatency -preset superfast -crf 28
      -threads 8 -g 30 -sc_threshold 0 -an -f rtsp rtsp://localhost:8554/jh2-main
    runOnDemandRestart: true
    runOnDemandStartTimeout: 30s
    runOnDemandCloseAfter: 10s
  qg1-main:
    runOnDemand: ffmpeg -rtsp_transport tcp -fflags nobuffer+discardcorrupt -flags
      low_delay -i rtsp://10.66.66.118:8554/cam1 -vf scale=1920:-2 -c:v libx264 -tune
      zerolatency -preset superfast -crf 28 -threads 8 -g 30 -sc_threshold 0 -r 30
      -vsync cfr -an -f rtsp rtsp://localhost:8554/qg1-main
    runOnDemandRestart: true
    runOnDemandStartTimeout: 30s
    runOnDemandCloseAfter: 10s
  test-cctv:
    source: https://cctv-ss04.thb.gov.tw/T26-21K+323
    sourceOnDemand: true
  test-local:
    runOnDemand: ffmpeg -re -f lavfi -i testsrc2=size=1280x720:rate=30 -f lavfi -i
      sine=frequency=440:sample_rate=44100 -c:v libx264 -preset ultrafast -tune zerolatency
      -b:v 500k -c:a aac -b:a 64k -f rtsp rtsp://localhost:8554/test-local
    runOnDemandRestart: true
    runOnDemandStartTimeout: 15s
    runOnDemandCloseAfter: 10s
  jh1--7mt1:
    runOnDemand: ffmpeg -rtsp_transport tcp -fflags nobuffer+discardcorrupt -flags
      low_delay -hwaccel cuda -hwaccel_output_format cuda -c:v hevc_cuvid -i rtsp://10.66.66.160:8554/cam2
      -vf "hwdownload,format=nv12" -c:v libx264 -tune zerolatency -preset ultrafast
      -crf 23 -g 30 -an -f rtsp rtsp://localhost:8554/jh1--7mt1
    runOnDemandRestart: true
    runOnDemandStartTimeout: 30s
    runOnDemandCloseAfter: 10s
  goingjs-k180-10jo:
    runOnDemand: ffmpeg -rtsp_transport tcp -fflags nobuffer+discardcorrupt -flags
      low_delay -probesize 32 -analyzeduration 0 -i rtsp://10.66.66.118:8554/cam1
      -vf "scale=3840:-2" -c:v libx264 -tune zerolatency -preset superfast -crf 28
      -threads 8 -g 30 -sc_threshold 0 -r 30 -vsync cfr -an -f rtsp rtsp://localhost:8554/goingjs-k180-10jo
    runOnDemandRestart: true
    runOnDemandStartTimeout: 30s
    runOnDemandCloseAfter: 10s
