rtsp: true
rtspAddress: 0.0.0.0:8554
rtmp: true
rtmpAddress: 0.0.0.0:1935
hls: true
hlsAddress: 0.0.0.0:8888
hlsVariant: mpegts
hlsSegmentCount: 3
hlsSegmentDuration: 1s
hlsSegmentMaxSize: 50MB
hlsAlwaysRemux: true
hlsAllowOrigin: '*'
webrtc: true
webrtcAddress: 0.0.0.0:8889
api: true
apiAddress: 0.0.0.0:9997
paths:
  all: null
  jh1-main:
    runOnDemand: ffmpeg -rtsp_transport tcp -fflags nobuffer+discardcorrupt -flags
      low_delay -probesize 32 -analyzeduration 0 -i rtsp://10.66.66.126:8554/cam1
      -c:v libx264 -profile:v baseline -tune zerolatency -preset ultrafast -b:v 800k
      -bufsize 1600k -g 30 -an -f rtsp rtsp://localhost:8554/jh1-main
    runOnDemandRestart: true
    runOnDemandStartTimeout: 15s
    runOnDemandCloseAfter: 10s
  jh2-main:
    runOnDemand: ffmpeg -rtsp_transport tcp -fflags nobuffer+discardcorrupt -flags
      low_delay -hwaccel cuda -hwaccel_output_format cuda -c:v hevc_cuvid -i rtsp://10.66.66.119:8554/cam1
      -vf "scale_cuda=1920:-2,hwdownload,format=nv12" -c:v libx264 -tune zerolatency
      -preset ultrafast -crf 23 -g 30 -an -f rtsp rtsp://localhost:8554/jh2-main
    runOnDemandRestart: true
    runOnDemandStartTimeout: 30s
    runOnDemandCloseAfter: 10s
